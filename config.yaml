# Daily Driver Configuration
# Central config for all scripts and commands

# Where daily plans and notes are saved
output_dir: ~/git/docs-local/daily-driver

# Git repos to sync at day-start (skipped if dirty)
sync_repos:
  - ~/.claude
  - ~/git/code-workspaces

# Directory to scan for git activity at day-end
git_scan_dir: ~/git

# Job application tracker
tracker:
  follow_up_days: 7
  stale_days: 14
  active_statuses:
    - researching
    - applied
    - screening
    - interviewing
    - offer

# macOS Calendar integration for plan time blocks
calendar:
  plan_calendar_name: "Daily Plan"
  sync_enabled: true

# Check-in system (automated reminders via launchd at fixed times)
checkin:
  times:
    - "09:00"
    - "11:00"
    - "15:00"
    - "17:00"
  default_focus_minutes: 90

# Planning and carry-forward
planning:
  stale_threshold_days: 3

# Reporting commands configuration
reporting:
  standup:
    format: plain
    save: true
  week:
    save_dir: weekly
  month:
    save_dir: monthly
