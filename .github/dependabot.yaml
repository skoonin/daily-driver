version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    # PRs must land on the dev trunk; targeting the default branch (main)
    # creates duplicate commits and diverges main from dev (bit us at v1.1.0).
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Vancouver
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    labels:
      - dependencies
      - python

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: dev
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-deps:
        patterns: ["*"]
    labels:
      - dependencies
      - github-actions
