# Claude PR review -- runs ONLY on explicit request, never automatically, to
# keep API cost predictable:
# - Triggers on the 'pr-review' label being ADDED to a PR (pull_request:
#   labeled). It does NOT re-run on later pushes -- the labeled event fires
#   once per application. To re-review after new commits, remove and re-add the
#   label, or comment @claude for an ad-hoc review.
# - Same-repo guard: a fork PR's run could not read the dev-environment secret
#   anyway, and never triggers a paid review.
# Runs the trimmed multi-agent review committed at .claude/commands/sk-review-ci.md
# (two reviewers in parallel, then a reality-check pass) using the vendored
# agents in .claude/agents/.
name: Claude PR Review

on:
  pull_request:
    types: [labeled]

jobs:
  review:
    if: |
      github.event.label.name == 'pr-review' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    # Reads CC_API_KEY from the dev environment. Note: an environment with
    # required-reviewer or wait-timer protection rules would gate this job.
    environment: dev
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      # fetch-depth: 0 so the reviewers can diff against the PR base branch.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce  # v1.0.168
        with:
          anthropic_api_key: ${{ secrets.CC_API_KEY }}
          # No track_progress: the action rejects it for the 'labeled' event
          # (supported only on opened/synchronize/ready_for_review/reopened).
          # The review posts its own inline + summary comments instead.
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in
            ${{ github.repository }} by following the review process defined in
            .claude/commands/sk-review-ci.md. The PR base branch is
            ${{ github.event.pull_request.base.ref }}; scope the review to this
            PR's diff against that base. Launch the two reviewer subagents in
            parallel, run the reality-check pass, then post inline comments for
            verified findings and one top-level summary comment.
          claude_args: |
            --max-turns 40
            --allowedTools "Task,Read,Grep,Glob,WebFetch,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),mcp__github_inline_comment__create_inline_comment"
