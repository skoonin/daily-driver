# Automatic Claude review on new PRs. Cost controls, deliberate:
# - Gated on the CLAUDE_REVIEW_ENABLED repo variable (Settings -> Secrets and
#   variables -> Actions -> Variables, set to "true"): a kill switch, and it
#   keeps PRs green before the API key secret exists.
# - Triggers on opened/ready_for_review only, NOT synchronize -- one review
#   per PR, not one per push. Re-review an updated PR by commenting @claude.
# - Same-repo guard: fork PRs never trigger a paid review (their runs could
#   not read the secret anyway once the repo is public).
# - Runs the trimmed multi-agent review committed at
#   .claude/commands/sk-review-ci.md (two reviewers in parallel, then a
#   reality-check pass) using the vendored agents in .claude/agents/.
name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  review:
    if: |
      vars.CLAUDE_REVIEW_ENABLED == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    # Reads CC_API_KEY from the dev environment. Note: an environment with
    # required-reviewer or wait-timer protection rules would gate this job.
    environment: dev
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      # fetch-depth: 0 so the reviewers can diff against the PR base branch.
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Claude PR Review
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a  # v1.0.165
        with:
          anthropic_api_key: ${{ secrets.CC_API_KEY }}
          track_progress: true
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in
            ${{ github.repository }} by following the review process defined in
            .claude/commands/sk-review-ci.md. The PR base branch is
            ${{ github.event.pull_request.base.ref }}; scope the review to this
            PR's diff against that base. Launch the two reviewer subagents in
            parallel, run the reality-check pass, then post inline comments for
            verified findings and one top-level summary comment.
          claude_args: |
            --max-turns 40
            --allowedTools "Task,Read,Grep,Glob,WebFetch,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(git diff:*),Bash(git log:*),Bash(git show:*),mcp__github_inline_comment__create_inline_comment"
