# Automatic Claude review on new PRs. Cost controls, deliberate:
# - Gated on the CLAUDE_REVIEW_ENABLED repo variable (Settings -> Secrets and
#   variables -> Actions -> Variables, set to "true"): a kill switch, and it
#   keeps PRs green before the ANTHROPIC_API_KEY secret exists.
# - Triggers on opened/ready_for_review only, NOT synchronize -- one review
#   per PR, not one per push. Re-review an updated PR by commenting @claude.
# - Same-repo guard: fork PRs never trigger a paid review (their runs could
#   not read the secret anyway once the repo is public).
name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  review:
    if: |
      vars.CLAUDE_REVIEW_ENABLED == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1

      - name: Claude PR Review
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a  # v1.0.165
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for correctness bugs, data-loss risks in the
            jobs.csv write paths, error handling, test coverage, and
            adherence to CLAUDE.md conventions (CLI is presentation-only,
            subprocess calls through integrations/, flock-guarded workspace
            writes, plugin boundary). Use inline comments for specific
            issues and one top-level comment for general observations.
            Only flag issues that matter -- skip style nits the linters
            already enforce.
          claude_args: |
            --max-turns 25
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
