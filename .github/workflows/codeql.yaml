# CodeQL advanced setup. Replaces default setup so the analysis also runs on
# PRs targeting dev (the integration trunk) -- default setup only covers the
# default branch and PRs into it, which left the ruleset's CodeQL requirement
# on dev unsatisfiable. Scans python and the workflow YAML itself (actions).
name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly baseline scan so alerts surface even without a push.
    - cron: "31 3 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload analysis results
      packages: read # fetch the CodeQL packs
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both are interpreted / no compile step -> build-mode: none.
          - language: python
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a  # v4
        with:
          category: "/language:${{ matrix.language }}"
