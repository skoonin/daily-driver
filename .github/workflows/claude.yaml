# Interactive @claude responder for PULL REQUESTS ONLY: mention @claude in a PR
# comment or review and Claude answers / implements in that thread. Issues are
# intentionally excluded. Costs API usage only when invoked. Reads CC_API_KEY
# from the dev environment (the Claude GitHub App grants repo access, not model
# auth).
name: Claude Code

on:
  # issue_comment fires for PR conversation comments too; the job's `if` guard
  # keeps only those on a PR (github.event.issue.pull_request). No `issues`
  # trigger -- issue bodies/titles never invoke Claude.
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Three gates, all required:
    # 1. The event is on a PR (issue_comment only counts when it carries
    #    github.event.issue.pull_request; the other two events are PR-only).
    # 2. The '@claude' trigger phrase -- also the infinite-loop guard, since
    #    Claude's own replies never contain it.
    # 3. author_association in OWNER/MEMBER/COLLABORATOR -- on a PUBLIC repo this
    #    stops any outside user from spending the API key by commenting @claude.
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association))
    runs-on: ubuntu-latest
    # Reads CC_API_KEY from the dev environment. Note: an environment with
    # required-reviewer or wait-timer protection rules would gate this job,
    # delaying @claude replies until the rule is satisfied.
    environment: dev
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # lets Claude read CI results on PRs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce  # v1.0.168
        with:
          anthropic_api_key: ${{ secrets.CC_API_KEY }}
