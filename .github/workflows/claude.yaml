# Interactive @claude responder: mention @claude in an issue or PR comment and
# Claude answers / implements in that thread. Costs API usage only when
# invoked. Reads CC_API_KEY from the dev environment (the Claude GitHub App
# grants repo access, not model auth).
name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # The @claude gate is also the infinite-loop guard: Claude's own replies
    # never contain the trigger phrase.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # Reads CC_API_KEY from the dev environment. Note: an environment with
    # required-reviewer or wait-timer protection rules would gate this job,
    # delaying @claude replies until the rule is satisfied.
    environment: dev
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # lets Claude read CI results on PRs
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@558b1d6cab4085c7753fe402c10bef0fbb92ac7a  # v1.0.165
        with:
          anthropic_api_key: ${{ secrets.CC_API_KEY }}
