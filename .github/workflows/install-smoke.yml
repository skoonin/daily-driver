name: Install smoke test

on:
  pull_request:
    branches: [main]
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  smoke:
    name: pip install from source (py${{ matrix.python-version }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Create clean venv and install from checkout
        run: |
          python -m venv /tmp/smoke-venv
          source /tmp/smoke-venv/bin/activate
          pip install --upgrade pip
          pip install .
      - name: Assert entry point resolves
        run: |
          source /tmp/smoke-venv/bin/activate
          which daily-driver
          daily-driver --version
      - name: Assert import works
        run: |
          source /tmp/smoke-venv/bin/activate
          python -c "import daily_driver; print(daily_driver.__version__)"

# Linux parity deferred to a future release.
