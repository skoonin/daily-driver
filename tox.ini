[tox]
envlist = py311,py312,lint,type,coverage
isolated_build = True
skip_missing_interpreters = True

[testenv]
deps =
    pytest>=8.0.0
    pytest-timeout>=2.0.0
commands =
    pytest {posargs:tests/}
allowlist_externals = pytest
setenv =
    PYTHONPATH = {toxinidir}/source{:}{toxinidir}/tests
passenv =
    HOME
    USER
    CI
    GITHUB_*

[testenv:py311]
basepython = python3.11

[testenv:py312]
basepython = python3.12

[testenv:coverage]
deps =
    {[testenv]deps}
    coverage[toml]>=7.0.0
    pytest-cov>=6.0.0
commands =
    coverage run -m pytest {posargs:tests/}
    coverage report
    coverage html

[testenv:lint]
deps =
    -e .[dev]
commands =
    black --check source tests
    isort --check-only source tests
    flake8 source tests

[testenv:type]
deps =
    -e .[dev]
commands =
    {envpython} -m mypy source

[testenv:format]
deps =
    -e .[dev]
commands =
    black source tests
    isort source tests

[testenv:format-check]
deps =
    -e .[dev]
commands =
    black --check source tests
    isort --check-only source tests

[testenv:test-unit]
deps = {[testenv]deps}
commands = pytest --tb=short --no-header -v tests/test_core/ tests/test_integrations/

[testenv:test-cli]
deps = {[testenv]deps}
commands = pytest --tb=short --no-header -v tests/test_cli/

[testenv:test-core]
deps = {[testenv]deps}
commands = pytest --tb=short --no-header -v tests/test_core/

[testenv:test-gathers]
deps = {[testenv]deps}
commands = pytest --tb=short --no-header -v tests/test_gathers/

[testenv:test-scraper]
deps = {[testenv]deps}
commands = pytest --tb=short --no-header -v tests/test_plugins/job_search/scraper/

[testenv:test-e2e]
deps = {[testenv]deps}
commands = pytest --tb=short --no-header -v --timeout=300 tests/test_cli/test_e2e.py

[testenv:test-ci]
deps = {[testenv]deps}
commands = pytest -q {posargs:tests/}

[testenv:test-parallel]
deps =
    {[testenv]deps}
    pytest-xdist>=3.0.0
commands = pytest {posargs:tests/} -n auto

[testenv:test-verbose]
deps = {[testenv]deps}
commands = pytest --capture=fd -s -v {posargs:tests/}

[testenv:clean]
deps =
commands =
    python -c "import shutil; shutil.rmtree('htmlcov', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('.pytest_cache', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('dist', ignore_errors=True)"
    python -c "import shutil; shutil.rmtree('build', ignore_errors=True)"
    python -c "import pathlib; [p.unlink() for p in pathlib.Path('.').rglob('*.pyc')]"
    python -c "import pathlib; [p.rmdir() for p in pathlib.Path('.').rglob('__pycache__') if p.is_dir()]"
allowlist_externals = python
