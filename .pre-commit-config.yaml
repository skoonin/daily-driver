repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-json
      - id: check-docstring-first
      - id: debug-statements
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        files: ^(source|tests)/
        language_version: python3

  - repo: https://github.com/pycqa/isort
    rev: 6.0.1
    hooks:
      - id: isort
        files: ^(source|tests)/
        args: ["--profile", "black"]

  - repo: https://github.com/asottile/pyupgrade
    rev: v3.15.2
    hooks:
      - id: pyupgrade
        files: ^(source|tests)/
        # tracker.py uses typing.List intentionally; the `Tracker.list` method
        # shadows the builtin under `from __future__ import annotations`.
        exclude: ^source/daily_driver/core/tracker\.py$
        args: ["--py311-plus"]

  - repo: https://github.com/pycqa/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
        files: ^(source|tests)/
        args:
          - --remove-all-unused-imports
          - --in-place

  - repo: https://github.com/pycqa/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        files: ^(source|tests)/
        additional_dependencies: [Flake8-pyproject>=1.2.3]

  - repo: local
    hooks:
      - id: config-template-fresh
        name: config template is up to date
        entry: make check-config-template
        language: system
        pass_filenames: false
        files: ^(source/daily_driver/core/config_models\.py|source/daily_driver/core/config_template\.py|source/daily_driver/templates/\.dd-config\.yaml\.j2)$
